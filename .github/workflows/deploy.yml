name: Deploy Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: CDK Bootstrap
        working-directory: infrastructure
        run: cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/us-east-2

      - name: CDK Deploy
        working-directory: infrastructure
        run: cdk deploy --require-approval never

      - name: Print API URL
        working-directory: infrastructure
        run: |
          echo "✅ Deploy exitoso"
          cdk deploy --outputs-file outputs.json --require-approval never 2>/dev/null || true
          cat outputs.json 2>/dev/null || echo "Ver la URL en AWS Console > CloudFormation > YummeatStack > Outputs"
